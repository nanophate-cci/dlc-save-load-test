version: 2.1

jobs:
  check-storage-driver:
    machine:
      image: ubuntu-2204:2026.05.1
      docker_layer_caching: false
    steps:
      - run:
          name: Docker info - storage driver
          command: |
            echo "=== Docker version ==="
            docker version --format '{{.Server.Version}}'
            echo ""
            echo "=== Storage Driver ==="
            docker info --format '{{.Driver}}'
            echo ""
            echo "=== Full docker info (filtered) ==="
            docker info 2>&1 | grep -iE 'storage|driver|snapshotter|containerd|overlay|backing|data-dir'
            echo ""
            echo "=== daemon.json ==="
            cat /etc/docker/daemon.json 2>/dev/null || echo "(no daemon.json found)"
            echo ""
            echo "=== Docker data root ==="
            docker info --format '{{.DockerRootDir}}'
            echo ""
            echo "=== /var/lib/docker contents ==="
            ls -la /var/lib/docker/ 2>/dev/null | head -20

  check-storage-driver-28:
    machine:
      image: ubuntu-2204:2025.09.1
      docker_layer_caching: false
    steps:
      - run:
          name: Docker info - storage driver (Docker 28)
          command: |
            echo "=== Docker version ==="
            docker version --format '{{.Server.Version}}'
            echo ""
            echo "=== Storage Driver ==="
            docker info --format '{{.Driver}}'
            echo ""
            echo "=== Full docker info (filtered) ==="
            docker info 2>&1 | grep -iE 'storage|driver|snapshotter|containerd|overlay|backing|data-dir'
            echo ""
            echo "=== daemon.json ==="
            cat /etc/docker/daemon.json 2>/dev/null || echo "(no daemon.json found)"

workflows:
  test:
    jobs:
      - check-storage-driver
      - check-storage-driver-28
