version: 2.1

jobs:
  clean-check:
    machine:
      image: ubuntu-2204:2026.05.1
      docker_layer_caching: true
    steps:
      - run:
          name: What does DLC + Docker 29 default to?
          command: |
            echo "=== daemon.json ==="
            cat /etc/docker/daemon.json 2>/dev/null || echo "(does not exist)"
            echo ""
            echo "=== docker info ==="
            docker info 2>&1 | grep -iE "storage driver|driver-type|backing|server version"
            echo ""
            echo "=== /var/lib/docker filesystem ==="
            df -Th /var/lib/docker
            echo ""
            echo "=== /var/lib/docker contents ==="
            sudo ls -la /var/lib/docker/

workflows:
  test:
    jobs:
      - clean-check
