version: 2.1

jobs:
  force-overlay2-with-dlc:
    machine:
      image: ubuntu-2204:2026.05.1
      docker_layer_caching: true
    steps:
      - checkout
      - run:
          name: Check EVERYTHING before any changes
          command: |
            echo "=== daemon.json ==="
            cat /etc/docker/daemon.json 2>/dev/null || echo "(does not exist)"
            echo ""
            echo "=== Storage Driver ==="
            docker info --format 'Storage Driver: {{.Driver}}'
            docker info 2>&1 | grep -iE "driver-type|Backing" || true
            echo ""
            echo "=== /etc/docker/ contents ==="
            ls -la /etc/docker/ 2>/dev/null || echo "(no /etc/docker)"
      - run:
          name: Force overlay2 storage driver
          command: |
            echo '{"storage-driver": "overlay2"}' | sudo tee /etc/docker/daemon.json
            sudo systemctl restart docker
            echo "=== After ==="
            docker info --format 'Storage Driver: {{.Driver}}'
      - run:
          name: Build Docker image
          command: docker build -t dlc-test:latest .
      - run:
          name: Verify
          command: docker run --rm dlc-test:latest

workflows:
  test:
    jobs:
      - force-overlay2-with-dlc
