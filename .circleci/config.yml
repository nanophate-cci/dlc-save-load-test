version: 2.1

jobs:
  # Test: can user force overlay2 on Docker 29 and keep DLC working?
  force-overlay2-with-dlc:
    machine:
      image: ubuntu-2204:2026.05.1
      docker_layer_caching: true
    steps:
      - checkout
      - run:
          name: Check storage driver BEFORE change
          command: |
            echo "=== Before ==="
            docker info --format 'Storage Driver: {{.Driver}}'
            docker info 2>&1 | grep -i "driver-type" || true
      - run:
          name: Force overlay2 storage driver
          command: |
            echo '{"storage-driver": "overlay2"}' | sudo tee /etc/docker/daemon.json
            sudo systemctl restart docker
            echo "=== After restart ==="
            docker info --format 'Storage Driver: {{.Driver}}'
            docker info 2>&1 | grep -iE "driver-type|Backing" || true
      - run:
          name: Build Docker image
          command: |
            docker build -t dlc-test:latest .
            docker images dlc-test
      - run:
          name: Verify
          command: docker run --rm dlc-test:latest

workflows:
  test:
    jobs:
      - force-overlay2-with-dlc
