version: 2.1

jobs:
  build-with-save-load-cache:
    machine:
      image: ubuntu-2204:2026.05.1
      docker_layer_caching: false
    steps:
      - checkout
      - run:
          name: Show Docker version
          command: docker version
      - restore_cache:
          keys:
            - docker-v2-{{ checksum "Dockerfile" }}
            - docker-v2-
      - run:
          name: Load cached Docker image (if exists)
          command: |
            if [ -f /tmp/docker-cache/image.tar ]; then
              echo "Cache HIT — loading saved image for --cache-from"
              docker load < /tmp/docker-cache/image.tar
              echo "Loaded successfully"
              docker images
            else
              echo "Cache MISS — will build from scratch"
            fi
      - run:
          name: Build Docker image (uses --cache-from if available)
          command: |
            echo "=== Building image ==="
            DOCKER_BUILDKIT=1 time docker build \
              --cache-from dlc-test:latest \
              -t dlc-test:latest .
            echo "=== Build complete ==="
            docker images
      - run:
          name: Save Docker image for cache
          command: |
            mkdir -p /tmp/docker-cache
            echo "=== Saving image ==="
            time docker save dlc-test:latest > /tmp/docker-cache/image.tar
            ls -lh /tmp/docker-cache/image.tar
            echo "=== Save complete ==="
      - save_cache:
          key: docker-v2-{{ checksum "Dockerfile" }}
          paths:
            - /tmp/docker-cache
      - run:
          name: Verify image works
          command: docker run --rm dlc-test:latest

workflows:
  test:
    jobs:
      - build-with-save-load-cache
